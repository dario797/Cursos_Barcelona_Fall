      .badge-amber { background: #633806 !important; color: #FAC775 !important; }
      .badge-coral { background: #712B13 !important; color: #F5C4B3 !important; }
      .badge-purple { background: #3C3489 !important; color: #CECBF6 !important; }
      .badge-pink { background: #72243E !important; color: #F4C0D1 !important; }
      .av-blue { background: #0C447C !important; color: #B5D4F4 !important; }

      padding: 2rem 1rem;
    }

    .header { margin-bottom: 1.75rem; }

    .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 22px; font-weight: 500; }
    .course-list { display: flex; flex-direction: column; gap: 8px; }
    .course-card {

    .av-blue { background: #B5D4F4; color: #042C53; }

    .empty { text-align: center; padding: 2.5rem; color: var(--text-secondary); font-size: 14px; }
    .disclaimer { font-size: 11px; color: var(--text-secondary); text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }
  </style>
</head>

function avgNota(c){
  const valid = c.comments.filter(x => x.nota_academica !== null && x.nota_academica !== undefined);
  if(!valid.length) return null;
  return valid.reduce((s,x)=>s+x.nota_academica,0)/valid.length;
}
function colorClass(n){ if(n===null) return ""; return n>=8?"alta":n>=6?"media":"baja"; }
function stars(n){ const f=Math.round(n/2); return "★".repeat(f)+"☆".repeat(5-f); }
function initials(name){ return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }
function fmtNota(n){ return n===null?"N/D":n.toFixed(1); }

let openId = null;
function toggle(id){ openId = openId===id?null:id; render(); }

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const uni = document.getElementById("uni-filter").value;
  const sort = document.getElementById("sort").value;

  let list = COURSES.filter(c =>
    (!q || c.name.toLowerCase().includes(q) || c.profesor.toLowerCase().includes(q) || c.dept.toLowerCase().includes(q)) &&
    (!uni || c.uni === uni)
  );

  if(sort==="nota-desc") list.sort((a,b)=>(avgNota(b)||0)-(avgNota(a)||0));
  else if(sort==="val-desc") list.sort((a,b)=>b.comments.length-a.comments.length);
  else if(sort==="comments") list.sort((a,b)=>b.comments.length-a.comments.length);
  else list.sort((a,b)=>a.name.localeCompare(b.name,"es"));

  const validCourses = COURSES.filter(c=>avgNota(c)!==null);
  const globalAvg = validCourses.length ? (validCourses.reduce((s,c)=>s+avgNota(c),0)/validCourses.length).toFixed(1) : "N/D";
  const totalComments = COURSES.reduce((s,c)=>s+c.comments.length,0);

  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-label">Cursos</div><div class="stat-value">${COURSES.length}</div></div>
    <div class="stat"><div class="stat-label">Nota media global</div><div class="stat-value">${globalAvg}</div></div>
    <div class="stat"><div class="stat-label">Reseñas totales</div><div class="stat-value">${totalComments}</div></div>
    <div class="stat"><div class="stat-label">Mostrando</div><div class="stat-value">${list.length}</div></div>
  `;

  if(!list.length){
    document.getElementById("list").innerHTML = `<div class="empty">Sin resultados para esa búsqueda</div>`;
    return;
  }

  document.getElementById("list").innerHTML = list.map(c => {
    const a = avgNota(c);
    const isOpen = openId===c.id;
    const metaText = [c.uni, c.dept, c.code, c.profesor, c.grupo].filter(Boolean).join(" · ");
    const validComments = c.comments.filter(x=>x.nota_academica!==null&&x.nota_academica!==undefined);

    const notaRows = validComments.map(cm=>`
      <div class="nota-row">
        <span class="nota-row-name">${cm.name}</span>
        <div class="nota-bar-wrap"><div class="nota-bar" style="width:${(cm.nota_academica/10)*100}%"></div></div>
        <span class="nota-row-val">${cm.nota_academica.toFixed(1)}</span>
      </div>
    `).join("");

    const notaPanel = `
      <div>
        <div class="section-title">Nota académica media</div>
        <div class="nota-panel">
          <div class="nota-big ${colorClass(a)}">${a!==null?a.toFixed(1):"N/D"}</div>
          <div class="nota-sub">sobre 10 · ${validComments.length} dato${validComments.length!==1?"s":""}</div>
          <div class="nota-rows">${notaRows}</div>
        </div>
      </div>
    `;

    const commentsPanel = `
      <div>
        <div class="section-title">Valoraciones (${c.comments.length})</div>
        <div class="comments-list">
          ${c.comments.map(cm=>`
            <div class="comment">
              <div class="comment-top">
                <div class="avatar ${cm.av}">${initials(cm.name)}</div>
                <span class="comment-author">${cm.name}</span>
              </div>
              <p class="comment-text">${cm.text}</p>
            </div>
          `).join("")}
        </div>
      </div>
    `;

    return `<div class="course-card ${isOpen?"open":""}">
      <div class="course-header" onclick="toggle(${c.id})" role="button" aria-expanded="${isOpen}" tabindex="0"
        onkeydown="if(event.key==='Enter'||event.key===' ')toggle(${c.id})">
        <span class="course-badge ${c.badge}">${c.uni}</span>
        <div class="course-info">
          <div class="course-name">${c.name}</div>
          <div class="course-meta-text">${metaText}</div>
        </div>
        <div class="course-right">
          <div class="nota-pill">
            <span class="nota-num ${colorClass(a)}">${fmtNota(a)}</span>
          </div>
          <span class="nota-label">nota media</span>
          <span class="n-comments"><i class="ti ti-message" style="font-size:13px;vertical-align:-1px;margin-right:2px"></i>${c.comments.length} reseña${c.comments.length!==1?"s":""}</span>
        </div>
        <i class="ti ti-chevron-down chevron"></i>
      </div>
      <div class="course-body">
        <div class="body-grid">
          ${notaPanel}
          ${commentsPanel}
        </div>
      </div>
    </div>`;
  }).join("");
}

// Populate university filter
const unis = [...new Set(COURSES.map(c=>c.uni))].sort();
const sel = document.getElementById("uni-filter");
unis.forEach(u=>{ const o=document.createElement("option"); o.value=u; o.textContent=u; sel.appendChild(o); });

render();
</script>
</body>
</html>
